<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ TITLE }}</title>
    <link rel="stylesheet" href="/operator/static/operator.css">
  </head>
  <body data-operator-page="{{ PAGE_ID }}">
    <header class="operator-topbar">
      <div class="operator-topbar-inner">
        <a class="operator-brand" href="/operator">
          <span class="operator-brand-mark">AT</span>
          <span class="operator-brand-copy">AUTO TRADER V2</span>
        </a>
        <button
          id="operator-nav-toggle"
          class="operator-nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="operator-nav"
        >
          ☰ 메뉴
        </button>
        <nav id="operator-nav" class="operator-nav" aria-label="운영 네비게이션">
          <a class="operator-nav-link {{ NAV_CONSOLE_ACTIVE }}" href="/operator">대시보드</a>
          <a class="operator-nav-link {{ NAV_LOGS_ACTIVE }}" href="/operator/logs">로그</a>
        </nav>
      </div>
    </header>
    {{ BODY }}
    <div id="confirm-modal" class="confirm-modal" hidden aria-hidden="true">
      <div id="confirm-modal-backdrop" class="confirm-modal-backdrop"></div>
      <div
        class="confirm-modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirm-modal-title"
        aria-describedby="confirm-modal-message"
      >
        <div class="confirm-modal-head">
          <p class="eyebrow">실행 확인</p>
          <h2 id="confirm-modal-title">이 작업을 실행할까요?</h2>
        </div>
        <p id="confirm-modal-message" class="confirm-modal-message">요청 내용을 다시 확인한 뒤 진행하세요.</p>
        <div class="confirm-modal-actions">
          <button id="confirm-cancel" class="btn ghost" type="button">취소</button>
          <button id="confirm-ok" class="btn primary" type="button">확인</button>
        </div>
      </div>
    </div>
    <script src="/operator/static/operator.js" defer></script>
  </body>
</html>
