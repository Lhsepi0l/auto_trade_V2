<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ TITLE }}</title>
    <meta
      name="description"
      content="Auto Trader V2 웹 운영 패널. 상태, 포지션, 로그, 리스크."
    >
    <meta name="theme-color" content="#0071e3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AT Ops">
    <link rel="manifest" href="{{ OPERATOR_MANIFEST_URL }}">
    <link rel="icon" href="{{ OPERATOR_FAVICON_URL }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ OPERATOR_APPLE_ICON_URL }}">
    <link rel="stylesheet" href="{{ OPERATOR_CSS_URL }}">
  </head>
  <body
    data-operator-page="{{ PAGE_ID }}"
    data-operator-sw-url="{{ OPERATOR_SW_URL }}"
    data-operator-scope="/operator/"
  >
    <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
    <header class="operator-topbar">
      <div class="operator-topbar-inner">
        <a class="operator-brand" href="/operator" aria-label="Auto Trader V2 홈">
          <span class="operator-brand-mark">AT</span>
          <span class="operator-brand-copy">Auto Trader V2</span>
        </a>
        <button
          id="operator-nav-toggle"
          class="operator-nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="operator-nav"
        >
          메뉴
        </button>
        <nav id="operator-nav" class="operator-nav" aria-label="운영 네비게이션">
          <a class="operator-nav-link {{ NAV_CONSOLE_ACTIVE }}" href="/operator">대시보드</a>
          <a class="operator-nav-link {{ NAV_LOGS_ACTIVE }}" href="/operator/logs">로그</a>
        </nav>
      </div>
    </header>
    {{ BODY }}
    <div id="confirm-modal" class="confirm-modal" hidden aria-hidden="true">
      <div id="confirm-modal-backdrop" class="confirm-modal-backdrop"></div>
      <div
        class="confirm-modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirm-modal-title"
        aria-describedby="confirm-modal-message"
      >
        <div class="confirm-modal-head">
          <p class="eyebrow">실행 확인</p>
          <h2 id="confirm-modal-title">이 작업을 실행할까요?</h2>
        </div>
        <p id="confirm-modal-message" class="confirm-modal-message">요청 내용을 다시 확인한 뒤 진행하세요.</p>
        <div class="confirm-modal-actions">
          <button id="confirm-cancel" class="btn ghost" type="button">취소</button>
          <button id="confirm-ok" class="btn primary" type="button">확인</button>
        </div>
      </div>
    </div>
    <script src="{{ OPERATOR_JS_URL }}" defer></script>
  </body>
</html>
