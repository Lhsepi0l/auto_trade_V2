version: 2
base:
  app_name: auto-trader-v2
  timezone: UTC
  scheduler:
    tick_seconds: 30
    max_drift_seconds: 5
  exchange:
    venue: binance-usdm
    recv_window_ms: 5000
    default_symbol: BTCUSDT
    request_rate_limit_per_sec: 5.0
    backoff_base_seconds: 0.5
    backoff_cap_seconds: 10.0
    user_stream_keepalive_seconds: 1800
    user_stream_reconnect_min_seconds: 1.0
    user_stream_reconnect_max_seconds: 30.0
    user_stream_connection_ttl_seconds: 82800
    user_stream_reorder_window_ms: 300
    market_intervals: [15m, 1h, 4h]
  engine:
    allow_reentry: false
    max_open_positions: 1
  risk:
    max_leverage: 5.0
    max_exposure_pct: 0.20
    daily_loss_limit_pct: -0.02
    dd_limit_pct: -0.15
  tpsl:
    take_profit_pct: 0.02
    stop_loss_pct: 0.01
    trailing_enabled: false
  strategies:
    - name: ra_2026_alpha_v2
      enabled: true
      params: &ra_2026_alpha_v2_params
        supported_symbols: [BTCUSDT]
        enabled_alphas: [alpha_breakout, alpha_pullback, alpha_expansion]
        ema_fast_4h: 50
        ema_slow_4h: 200
        adx_period_4h: 14
        trend_adx_min_4h: 14.0
        ema_bias_period_1h: 34
        rsi_period_1h: 14
        bias_rsi_long_min_1h: 50.0
        bias_rsi_short_max_1h: 50.0
        atr_period_15m: 14
        ema_pullback_period_15m: 20
        donchian_period_15m: 20
        bb_period_15m: 20
        bb_std_15m: 2.0
        volume_sma_period_15m: 20
        swing_lookback_15m: 8
        breakout_buffer_bps: 3.0
        expansion_buffer_bps: 2.0
        min_volume_ratio_15m: 0.9
        squeeze_lookback_15m: 48
        squeeze_percentile_threshold: 0.40
        pullback_touch_atr_mult: 0.40
        expansion_range_atr_min: 1.0
        expansion_long_break_distance_atr_max: 1.1
        expansion_retest_band_atr_mult: 0.35
        expansion_strong_immediate_body_ratio_min: 0.55
        expansion_strong_immediate_close_location_min: 0.72
        expansion_strong_immediate_quality_score_v2_min: 0.72
        expansion_strong_immediate_breakout_distance_atr_max: 0.85
        expansion_strong_immediate_require_regime_alignment: false
        expansion_strong_immediate_side_mode: BOTH
        expansion_short_confirm_break_distance_atr_min: 0.0
        expansion_short_confirm_close_location_min: 0.0
        expansion_long_confirm_close_location_max: 1.0
        taker_fee: 0.0006
        slippage_bps: 2.0
        max_spread_bps: 8.0
        backtest_spread_bps_fallback: 1.5
        min_expected_move_floor: 0.0006
        expected_move_cost_mult: 2.0
        stop_atr_mult: 1.5
        min_stop_distance_frac: 0.0020
        take_profit_r: 2.0
        management_policy: tp1_runner
        tp_partial_ratio: 0.25
        tp_partial_target_frac: 0.60
        tp_partial_min_r: 1.0
        tp_partial_max_r: 1.2
        move_stop_to_be_at_r: 1.0
        time_stop_bars: 24
        stop_exit_cooldown_bars: 12
        profit_exit_cooldown_bars: 0
        risk_per_trade_pct: 0.012
        max_effective_leverage: 0.0
  storage:
    sqlite_path: data/v2_runtime.sqlite3
    journal_table: runtime_journal
  ops:
    pause_on_start: false
    flatten_on_kill: true
  notify:
    enabled: false
    provider: none

